name: wave_flutter
description: Wave Messenger mobile client for Android built with Flutter.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cookie_jar: ^4.0.8
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  dio_cookie_manager: ^3.2.0
  google_fonts: ^6.3.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  provider: ^6.1.5
  web_socket_channel: ^3.0.3
  flutter_webrtc: ^1.3.1
  image_picker: ^1.2.1
  qr_flutter: ^4.1.0
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
