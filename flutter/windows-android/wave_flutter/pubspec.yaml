name: wave_flutter
description: Wave Messenger Flutter client with Android UI and Windows desktop shell.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cookie_jar: ^4.0.8
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  dio_cookie_manager: ^3.2.0
  google_fonts: ^6.3.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  provider: ^6.1.5
  web_socket_channel: ^3.0.3
  flutter_webrtc: ^1.3.1
  image_picker: ^1.2.1
  qr_flutter: ^4.1.0
  audioplayers: ^6.6.0
  webview_windows: ^0.4.0
  package_info_plus: ^8.3.1
  url_launcher: ^6.3.2
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/wave_logo.png
