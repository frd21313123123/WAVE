name: Build Windows EXE

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-windows-exe-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.41.4
  FLUTTER_PROJECT_DIR: wave_flutter
  WINDOWS_BUNDLE_DIR: wave_flutter/build/windows/x64/runner/Release
  WAVE_BASE_URL: ${{ vars.WAVE_BASE_URL }}

jobs:
  build-windows:
    name: Build Windows Bundle
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get
        working-directory: ${{ env.FLUTTER_PROJECT_DIR }}

      - name: Analyze project
        run: flutter analyze
        working-directory: ${{ env.FLUTTER_PROJECT_DIR }}

      - name: Run tests
        run: flutter test
        working-directory: ${{ env.FLUTTER_PROJECT_DIR }}

      - name: Build release bundle
        shell: pwsh
        working-directory: ${{ env.FLUTTER_PROJECT_DIR }}
        run: |
          if ($env:WAVE_BASE_URL) {
            flutter build windows --release --dart-define=WAVE_BASE_URL=$env:WAVE_BASE_URL
          }
          else {
            flutter build windows --release
          }

      - name: Package Windows bundle
        id: package_bundle
        shell: pwsh
        run: |
          $bundleDir = Resolve-Path '${{ env.WINDOWS_BUNDLE_DIR }}'
          $stageDir = Join-Path $env:RUNNER_TEMP 'wave-windows-bundle'
          $assetName = 'wave-windows-x64-${{ github.run_number }}.zip'
          $assetPath = Join-Path $env:RUNNER_TEMP $assetName

          if (Test-Path $stageDir) {
            Remove-Item -Recurse -Force $stageDir
          }

          New-Item -ItemType Directory -Path $stageDir | Out-Null
          Copy-Item -Path (Join-Path $bundleDir '*') -Destination $stageDir -Recurse -Force

          if (Test-Path $assetPath) {
            Remove-Item -Force $assetPath
          }

          Compress-Archive -Path (Join-Path $stageDir '*') -DestinationPath $assetPath -Force

          "asset_path=$assetPath" >> $env:GITHUB_OUTPUT
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: wave-windows-bundle
          path: ${{ steps.package_bundle.outputs.asset_path }}
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish Windows Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-windows

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: wave-windows-bundle
          path: release-assets/windows

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          TAG="windows-build-${GITHUB_RUN_NUMBER}-${GITHUB_SHA}"
          TITLE="Wave Windows Build #${GITHUB_RUN_NUMBER} (${GITHUB_REF_NAME})"
          ASSET="$(find release-assets/windows -type f -name '*.zip' | head -n 1)"

          if [[ -z "${ASSET}" ]]; then
            echo "Release asset not found." >&2
            exit 1
          fi

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${ASSET}" --clobber
          else
            gh release create "${TAG}" "${ASSET}" \
              --title "${TITLE}" \
              --target "${GITHUB_SHA}" \
              --generate-notes \
              --prerelease
          fi
